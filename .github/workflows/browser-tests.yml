name: Browser Tests

on:
  workflow_dispatch:
    inputs:
      test_path:
        description: Playwright test path to run
        required: false
        default: tests/e2e-browser
        type: string

jobs:
  browser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser tests
        run: pnpm exec playwright test "$TEST_PATH" --project=default
        env:
          TEST_PATH: ${{ inputs.test_path }}
          APP_ENV: test
          CI: "true"
          DATABASE_URL: postgres://slotmerge:slotmerge@localhost:5432/slotmerge

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            playwright/.artifacts/test-results/
            test-results/
          retention-days: 14

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright/.artifacts/**/*.webm
            playwright/.artifacts/**/*.zip
            playwright/.auth/**
          retention-days: 14
