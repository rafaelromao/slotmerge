name: Browser Tests

on:
  workflow_dispatch:

jobs:
  browser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start local stack
        run: pnpm local:up &
        env:
          APP_ENV: test

      - name: Wait for services
        run: sleep 30 && curl -s http://localhost:3000/api/local/health || exit 1

      - name: Run browser tests
        run: pnpm exec playwright test --project=default
        env:
          APP_ENV: test
          DATABASE_URL: postgres://slotmerge:slotmerge@localhost:5432/slotmerge

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: playwright/.artifacts/test-results/
          retention-days: 14

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: playwright/.artifacts/**/trace.zip
          retention-days: 14
