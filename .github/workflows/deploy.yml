name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image-digest:
        description: "Image digest to promote to production (format: sha256:...)"
        required: true
        type: string

env:
  GCP_PROJECT_ID_STAGING: slotmerge-staging
  GCP_PROJECT_ID_PRODUCTION: slotmerge-production
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY_REPOSITORY: slotmerge
  IMAGE_NAME: slotmerge
  CLOUD_RUN_SERVICE_WEB_STAGING: slotmerge-staging-web
  CLOUD_RUN_SERVICE_WORKER_STAGING: slotmerge-staging-worker
  CLOUD_RUN_SERVICE_WEB_PRODUCTION: slotmerge-production-web
  CLOUD_RUN_SERVICE_WORKER_PRODUCTION: slotmerge-production-worker

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  local-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ci-checks]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: slotmerge
          POSTGRES_USER: slotmerge
          POSTGRES_PASSWORD: slotmerge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U slotmerge -d slotmerge"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      APP_ENV: local
      DATABASE_URL: postgres://slotmerge:slotmerge@localhost:5432/slotmerge
      LOCAL_WEB_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate

      - name: Run local verification
        run: |
          pnpm dev:web & pnpm dev:worker & pnpm local:verify

  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [local-verify]
    outputs:
      image-digest: ${{ steps.meta.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID_STAGING }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha256-,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=false

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,push-by-digest=true,name-canonical=${{ steps.meta.outputs.tags }}

      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ steps.meta.outputs.tags }} --format '{{.Digest}}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-image]
    environment: staging
    steps:
      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (web)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE_WEB_STAGING }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID_STAGING }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}
          env-vars: |
            NODE_ENV=production,
            SLOTMERGE_ENV=staging,
            PROCESS_ROLE=web,
            GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID_STAGING }},
            GCP_REGION=${{ env.GCP_REGION }}
          secret-env-vars: |
            DATABASE_URL:slotmerge-staging-database-url,
            SESSION_SEAL_KEY:slotmerge-staging-session-seal-key,
            CALENDAR_TOKEN_ENCRYPTION_KEY:slotmerge-staging-calendar-token-encryption-key,
            GOOGLE_OAUTH_CLIENT_ID:slotmerge-staging-google-oauth-client-id,
            GOOGLE_OAUTH_CLIENT_SECRET:slotmerge-staging-google-oauth-client-secret,
            MICROSOFT_OAUTH_CLIENT_ID:slotmerge-staging-microsoft-oauth-client-id,
            MICROSOFT_OAUTH_CLIENT_SECRET:slotmerge-staging-microsoft-oauth-client-secret,
            POSTMARK_SERVER_TOKEN:slotmerge-staging-postmark-server-token,
            GOOGLE_WEBHOOK_SECRET:slotmerge-staging-google-webhook-secret,
            MICROSOFT_WEBHOOK_SECRET:slotmerge-staging-microsoft-webhook-secret
          cloud-sql-instances: ${{ env.GCP_PROJECT_ID_STAGING }}:${{ env.GCP_REGION }}:slotmerge-staging-postgres

      - name: Deploy to Cloud Run (worker)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE_WORKER_STAGING }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID_STAGING }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}
          env-vars: |
            NODE_ENV=production,
            SLOTMERGE_ENV=staging,
            PROCESS_ROLE=worker,
            GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID_STAGING }},
            GCP_REGION=${{ env.GCP_REGION }}
          secret-env-vars: |
            DATABASE_URL:slotmerge-staging-database-url,
            SESSION_SEAL_KEY:slotmerge-staging-session-seal-key,
            CALENDAR_TOKEN_ENCRYPTION_KEY:slotmerge-staging-calendar-token-encryption-key,
            GOOGLE_OAUTH_CLIENT_ID:slotmerge-staging-google-oauth-client-id,
            GOOGLE_OAUTH_CLIENT_SECRET:slotmerge-staging-google-oauth-client-secret,
            MICROSOFT_OAUTH_CLIENT_ID:slotmerge-staging-microsoft-oauth-client-id,
            MICROSOFT_OAUTH_CLIENT_SECRET:slotmerge-staging-microsoft-oauth-client-secret,
            POSTMARK_SERVER_TOKEN:slotmerge-staging-postmark-server-token
          cloud-sql-instances: ${{ env.GCP_PROJECT_ID_STAGING }}:${{ env.GCP_REGION }}:slotmerge-staging-postgres

  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [deploy-staging]
    environment: production
    steps:
      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Pull staging image
        run: |
          docker pull ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID_STAGING }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ inputs.image-digest }}

      - name: Push image to production registry
        run: |
          docker tag \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID_STAGING }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ inputs.image-digest }} \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID_PRODUCTION }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ inputs.image-digest }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID_PRODUCTION }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ inputs.image-digest }}

      - name: Install Cloud SQL Auth Proxy
        run: |
          wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.11.0/cloud-sql-proxy.linux.amd64 -O cloud-sql-proxy
          chmod +x cloud-sql-proxy

      - name: Run database migrations
        run: |
          ./cloud-sql-proxy \
            --port 5433 \
            ${{ env.GCP_PROJECT_ID_PRODUCTION }}:${{ env.GCP_REGION }}:slotmerge-production-postgres &
          PROXY_PID=$!
          sleep 3
          DATABASE_URL=$(gcloud secrets versions access latest --secret=slotmerge-production-database-url) \
            docker run --rm \
              --network=host \
              -e DATABASE_URL \
              ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID_PRODUCTION }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ inputs.image-digest }} \
              pnpm db:migrate
          MIGRATION_EXIT=$?
          kill $PROXY_PID 2>/dev/null || true
          if [ $MIGRATION_EXIT -ne 0 ]; then exit $MIGRATION_EXIT; fi

      - name: Deploy to Cloud Run (web) with no traffic
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE_WEB_PRODUCTION }} \
            --region ${{ env.GCP_REGION }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID_PRODUCTION }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ inputs.image-digest }} \
            --no-traffic \
            --min-instances=1 \
            --max-instances=10 \
            --set-env-vars="NODE_ENV=production,SLOTMERGE_ENV=production,PROCESS_ROLE=web,GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID_PRODUCTION }},GCP_REGION=${{ env.GCP_REGION }}" \
            --set-secrets="DATABASE_URL=slotmerge-production-database-url:latest,SESSION_SEAL_KEY=slotmerge-production-session-seal-key:latest,CALENDAR_TOKEN_ENCRYPTION_KEY=slotmerge-production-calendar-token-encryption-key:latest,GOOGLE_OAUTH_CLIENT_ID=slotmerge-production-google-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=slotmerge-production-google-oauth-client-secret:latest,MICROSOFT_OAUTH_CLIENT_ID=slotmerge-production-microsoft-oauth-client-id:latest,MICROSOFT_OAUTH_CLIENT_SECRET=slotmerge-production-microsoft-oauth-client-secret:latest,POSTMARK_SERVER_TOKEN=slotmerge-production-postmark-server-token:latest,GOOGLE_WEBHOOK_SECRET=slotmerge-production-google-webhook-secret:latest,MICROSOFT_WEBHOOK_SECRET=slotmerge-production-microsoft-webhook-secret:latest" \
            --add-cloudsql-instances ${{ env.GCP_PROJECT_ID_PRODUCTION }}:${{ env.GCP_REGION }}:slotmerge-production-postgres

      - name: Deploy to Cloud Run (worker) with no traffic
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE_WORKER_PRODUCTION }} \
            --region ${{ env.GCP_REGION }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID_PRODUCTION }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ inputs.image-digest }} \
            --no-traffic \
            --min-instances=1 \
            --max-instances=10 \
            --set-env-vars="NODE_ENV=production,SLOTMERGE_ENV=production,PROCESS_ROLE=worker,GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID_PRODUCTION }},GCP_REGION=${{ env.GCP_REGION }}" \
            --set-secrets="DATABASE_URL=slotmerge-production-database-url:latest,SESSION_SEAL_KEY=slotmerge-production-session-seal-key:latest,CALENDAR_TOKEN_ENCRYPTION_KEY=slotmerge-production-calendar-token-encryption-key:latest,GOOGLE_OAUTH_CLIENT_ID=slotmerge-production-google-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=slotmerge-production-google-oauth-client-secret:latest,MICROSOFT_OAUTH_CLIENT_ID=slotmerge-production-microsoft-oauth-client-id:latest,MICROSOFT_OAUTH_CLIENT_SECRET=slotmerge-production-microsoft-oauth-client-secret:latest,POSTMARK_SERVER_TOKEN=slotmerge-production-postmark-server-token:latest" \
            --add-cloudsql-instances ${{ env.GCP_PROJECT_ID_PRODUCTION }}:${{ env.GCP_REGION }}:slotmerge-production-postgres

      - name: Switch traffic to new production revision
        run: |
          gcloud run services update-traffic ${{ env.CLOUD_RUN_SERVICE_WEB_PRODUCTION }} \
            --region ${{ env.GCP_REGION }} \
            --to-latest

      - name: Switch worker traffic to new production revision
        run: |
          gcloud run services update-traffic ${{ env.CLOUD_RUN_SERVICE_WORKER_PRODUCTION }} \
            --region ${{ env.GCP_REGION }} \
            --to-latest
