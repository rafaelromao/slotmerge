name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  local-verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: slotmerge
          POSTGRES_USER: slotmerge
          POSTGRES_PASSWORD: slotmerge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U slotmerge -d slotmerge"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      APP_ENV: local
      DATABASE_URL: postgres://slotmerge:slotmerge@localhost:5432/slotmerge
      LOCAL_WEB_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm db:migrate
      - run: pnpm dev:web & pnpm dev:worker & pnpm local:verify

  deploy-staging:
    runs-on: ubuntu-latest
    needs: local-verify
    if: github.ref == 'refs/heads/main'
    steps:
      - run: echo "Build image and deploy staging Cloud Run services after local verification."

  promote-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - run: echo "Promote a verified image digest to production manually."
