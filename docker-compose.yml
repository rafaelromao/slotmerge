services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slotmerge
      POSTGRES_USER: slotmerge
      POSTGRES_PASSWORD: slotmerge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slotmerge -d slotmerge"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  provider-mock:
    image: node:22-alpine
    command: node tests/provider-mock/server.cjs
    environment:
      PROVIDER_MOCK_PORT: "3001"
    volumes:
      - .:/workspace
    working_dir: /workspace
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3001"]
      interval: 2s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: sh -c "pnpm db:migrate && pnpm dev:web"
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://slotmerge:slotmerge@postgres:5432/slotmerge
      LOCAL_WEB_URL: http://web:3000
      LOCAL_PROVIDER_OVERRIDE_URL: http://provider-mock:3001
      EMAIL_CAPTURE_ENABLED: "true"
      FIXTURE_DATE: "2026-07-12T12:00:00.000Z"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      provider-mock:
        condition: service_healthy

  worker:
    build: .
    command: sh -c "pnpm db:migrate && pnpm dev:worker"
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://slotmerge:slotmerge@postgres:5432/slotmerge
      LOCAL_WEB_URL: http://web:3000
      LOCAL_PROVIDER_OVERRIDE_URL: http://provider-mock:3001
      EMAIL_CAPTURE_ENABLED: "true"
      FIXTURE_DATE: "2026-07-12T12:00:00.000Z"
    depends_on:
      postgres:
        condition: service_healthy
      provider-mock:
        condition: service_healthy

  playwright:
    image: mcr.microsoft.com/playwright:v1.61.1
    profiles: ["local"]
    volumes:
      - playwright-cache:/ms-playwright

volumes:
  postgres-data:
  playwright-cache:
