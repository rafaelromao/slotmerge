services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slotmerge
      POSTGRES_USER: slotmerge
      POSTGRES_PASSWORD: slotmerge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slotmerge -d slotmerge"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build: .
    command: sh -c "pnpm db:migrate && pnpm dev:web"
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://slotmerge:slotmerge@postgres:5432/slotmerge
      LOCAL_WEB_URL: http://web:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: sh -c "pnpm db:migrate && pnpm dev:worker"
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://slotmerge:slotmerge@postgres:5432/slotmerge
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
